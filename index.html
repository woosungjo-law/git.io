<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하도급 대금 지연이자의 비밀 - 비주얼 노블</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #1A1A2E;
            color: #FFFFFF;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            margin: 0 auto;
            overflow: hidden;
            border: 3px solid #00D9FF;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        /* Background Layer */
        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        .bg-office {
            background: linear-gradient(180deg, #2C3E50 0%, #34495E 50%, #2C3E50 100%);
        }

        .bg-office::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 30%;
            height: 40%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .bg-office::after {
            content: '';
            position: absolute;
            top: 60%;
            left: 5%;
            width: 90%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        .bg-consultation {
            background: linear-gradient(180deg, #1E3A5F 0%, #2C5282 50%, #1E3A5F 100%);
        }

        .bg-court {
            background: linear-gradient(180deg, #4A1A1A 0%, #6B2C2C 50%, #4A1A1A 100%);
        }

        /* Character Layer */
        .character-layer {
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 35%;
            height: 85%;
            z-index: 2;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .character-layer.visible {
            opacity: 1;
        }

        .character-layer.right {
            left: auto;
            right: 10%;
        }

        /* Dialogue Box */
        .dialogue-box {
            position: absolute;
            bottom: 5%;
            left: 5%;
            right: 5%;
            height: 32%;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #FFFFFF;
            border-radius: 12px;
            padding: 20px 24px;
            z-index: 3;
        }

        .character-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00D9FF;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dialogue-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #FFFFFF;
            min-height: 80px;
        }

        .dialogue-text .highlight {
            color: #FF6B9D;
            font-weight: 700;
        }

        .dialogue-text .important {
            color: #00D9FF;
            font-weight: 700;
        }

        /* Click indicator */
        .click-indicator {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.6);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Choice Buttons */
        .choice-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            display: none;
            flex-direction: column;
            gap: 15px;
            width: 60%;
            max-width: 500px;
        }

        .choice-container.visible {
            display: flex;
        }

        .choice-btn {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #4A90E2;
            border-radius: 8px;
            padding: 15px 20px;
            color: #FFFFFF;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .choice-btn:hover {
            background: #4A90E2;
            transform: translateX(10px);
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.5);
        }

        /* UI Buttons */
        .ui-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 5;
            display: flex;
            gap: 10px;
        }

        .ui-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 6px 12px;
            color: #FFFFFF;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .ui-btn:hover {
            background: rgba(74, 144, 226, 0.7);
        }

        .ui-btn.active {
            background: #FF6B9D;
            border-color: #FF6B9D;
        }

        /* Scene Counter */
        .scene-counter {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Title Screen */
        .title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .title-screen h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00D9FF;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .title-screen p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .start-btn {
            background: linear-gradient(135deg, #FF6B9D, #00D9FF);
            border: none;
            border-radius: 30px;
            padding: 15px 50px;
            color: #FFFFFF;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
        }

        /* End Screen */
        .end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .end-screen.visible {
            display: flex;
        }

        .end-screen h2 {
            font-size: 2rem;
            color: #00D9FF;
            margin-bottom: 30px;
        }

        .end-screen .summary {
            font-size: 1.1rem;
            line-height: 2;
            color: #FFFFFF;
            max-width: 600px;
        }

        .end-screen .highlight {
            color: #FF6B9D;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .restart-btn {
            margin-top: 30px;
            background: #4A90E2;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            color: #FFFFFF;
            font-size: 1rem;
            cursor: pointer;
        }

        .restart-btn:hover {
            background: #FF6B9D;
        }

        @media (max-width: 768px) {
            .game-container {
                aspect-ratio: 4 / 3;
            }

            .dialogue-box {
                height: 40%;
            }

            .character-name {
                font-size: 1rem;
            }

            .dialogue-text {
                font-size: 0.95rem;
            }

            .title-screen h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Title Screen -->
        <div class="title-screen" id="titleScreen">
            <h1>하도급 대금 지연이자의 비밀</h1>
            <p>"계약서에 이자 규정이 없는데요?"</p>
            <button class="start-btn" onclick="startGame()">시작하기</button>
        </div>

        <!-- Background Layer -->
        <div class="background-layer bg-office" id="background"></div>

        <!-- Character Layer -->
        <div class="character-layer" id="character">
            <svg viewBox="0 0 400 800" width="100%" height="100%" id="characterSvg">
                <!-- Default: Park CEO -->
            </svg>
        </div>

        <!-- Dialogue Box -->
        <div class="dialogue-box" id="dialogueBox" onclick="nextDialogue()">
            <div class="character-name" id="charName">???</div>
            <div class="dialogue-text" id="dialogueText"></div>
            <div class="click-indicator">클릭하여 계속 ▼</div>
        </div>

        <!-- Choice Container -->
        <div class="choice-container" id="choiceContainer"></div>

        <!-- UI Controls -->
        <div class="ui-controls">
            <button class="ui-btn" id="autoBtn" onclick="toggleAuto()">AUTO</button>
            <button class="ui-btn" onclick="skipDialogue()">SKIP</button>
        </div>

        <!-- Scene Counter -->
        <div class="scene-counter" id="sceneCounter">SCENE 1</div>

        <!-- End Screen -->
        <div class="end-screen" id="endScreen">
            <h2>핵심 정리</h2>
            <div class="summary">
                <p>계약서에 지연이자 조항이 없어도</p>
                <p class="highlight">연 15.5%</p>
                <p>하도급법이 당신을 보호합니다!</p>
                <br>
                <p>대법원 2010두16561 판결</p>
                <p>하도급법 제13조 제8항 (강행규정)</p>
            </div>
            <button class="restart-btn" onclick="restartGame()">다시 보기</button>
        </div>
    </div>

        // Game Functions
        function startGame() {
            document.getElementById('titleScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('titleScreen').style.display = 'none';
            }, 500);
            currentScene = 0;
            currentDialogue = 0;
            showScene();
        }

        function showScene() {
            const scene = scenes[currentScene];
            document.getElementById('sceneCounter').textContent = `SCENE ${currentScene + 1}`;
            showDialogue();
        }

        function showDialogue() {
            const scene = scenes[currentScene];
            if (currentDialogue >= scene.dialogues.length) {
                if (scene.choice) {
                    showChoices(scene.choice);
                } else if (scene.end) {
                    showEndScreen();
                } else {
                    currentScene = scene.next;
                    currentDialogue = 0;
                    showScene();
                }
                return;
            }

            const dialogue = scene.dialogues[currentDialogue];

            // Update character
            const charLayer = document.getElementById('character');
            if (dialogue.sprite && characters[dialogue.sprite]) {
                document.getElementById('characterSvg').innerHTML = characters[dialogue.sprite];
                charLayer.classList.add('visible');
            } else {
                charLayer.classList.remove('visible');
            }

            // Update background
            const bgLayer = document.getElementById('background');
            bgLayer.className = 'background-layer';
            if (dialogue.bg === 'consultation') {
                bgLayer.classList.add('bg-consultation');
            } else if (dialogue.bg === 'court') {
                bgLayer.classList.add('bg-court');
            } else {
                bgLayer.classList.add('bg-office');
            }

            // Update character name
            document.getElementById('charName').textContent = dialogue.char;

            // Typewriter effect
            typeWriter(dialogue.text);
        }

        function typeWriter(text) {
            isTyping = true;
            fullText = text;
            const textElement = document.getElementById('dialogueText');
            textElement.innerHTML = '';
            let i = 0;
            let inTag = false;
            let currentTag = '';

            function type() {
                if (i < text.length) {
                    const char = text.charAt(i);

                    if (char === '<') {
                        inTag = true;
                        currentTag = char;
                    } else if (char === '>') {
                        inTag = false;
                        currentTag += char;
                        textElement.innerHTML += currentTag;
                        currentTag = '';
                    } else if (inTag) {
                        currentTag += char;
                    } else {
                        textElement.innerHTML += char;
                    }

                    i++;
                    setTimeout(type, 30);
                } else {
                    isTyping = false;
                    if (autoMode) {
                        setTimeout(nextDialogue, 2000);
                    }
                }
            }
            type();
        }

        function nextDialogue() {
            if (isTyping) {
                document.getElementById('dialogueText').innerHTML = fullText;
                isTyping = false;
                return;
            }
            currentDialogue++;
            showDialogue();
        }

        function showChoices(choice) {
            const container = document.getElementById('choiceContainer');
            container.innerHTML = '';

            choice.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = option.text;
                btn.onclick = () => selectChoice(option.next);
                container.appendChild(btn);
            });

            container.classList.add('visible');
        }

        function selectChoice(nextScene) {
            document.getElementById('choiceContainer').classList.remove('visible');
            currentScene = nextScene;
            currentDialogue = 0;
            showScene();
        }

        function toggleAuto() {
            autoMode = !autoMode;
            const btn = document.getElementById('autoBtn');
            btn.classList.toggle('active');
        }

        function skipDialogue() {
            if (isTyping) {
                document.getElementById('dialogueText').innerHTML = fullText;
                isTyping = false;
            } else {
                nextDialogue();
            }
        }

        function showEndScreen() {
            document.getElementById('endScreen').classList.add('visible');
        }

        function restartGame() {
            document.getElementById('endScreen').classList.remove('visible');
            currentScene = 0;
            currentDialogue = 0;
            showScene();
        }
    </script>
